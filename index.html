<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Iron Log — Workout Hub</title>
<meta name="description" content="Personal progressive-overload workout tracker.">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#101114">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&family=Baloo+2:wght@600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <h1>IRON<span>LOG</span></h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="profile-btn" id="profileBtn"><span class="profile-avatar" id="profileAvatar">?</span><span id="profileNameLabel">Profile</span></button>
    <div class="week-dial">
      <div id="weekDialRing" class="ring"></div>
      <div id="weekDialLabel" class="label">Week 1<strong>Training</strong></div>
    </div>
  </div>
</header>
<div id="profilePanel" class="profile-panel" style="display:none;"></div>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="home">Home</button>
  <button class="tab-btn" data-tab="plan">Plan</button>
  <button class="tab-btn" data-tab="today">Today</button>
  <button class="tab-btn" data-tab="recovery">Recovery</button>
  <button class="tab-btn" data-tab="progress">Progress</button>
  <button class="tab-btn" data-tab="stats">Stats</button>
  <button class="tab-btn" data-tab="settings">Settings</button>
</nav>

<main>
  <section id="panel-home" class="tab-panel active"></section>
  <section id="panel-plan" class="tab-panel"></section>
  <section id="panel-today" class="tab-panel"></section>
  <section id="panel-recovery" class="tab-panel"></section>
  <section id="panel-progress" class="tab-panel"></section>
  <section id="panel-stats" class="tab-panel"></section>
  <section id="panel-settings" class="tab-panel"></section>
</main>

<div id="toast" class="toast"></div>

<script src="js/storage.js"></script>
<script src="js/sync.js"></script>
<script src="js/progression.js"></script>
<script src="js/recovery.js"></script>
<script src="js/standards.js"></script>
<script src="js/scheduler.js"></script>
<script src="js/charts.js"></script>
<script src="js/bodymap.js"></script>
<script src="js/planreview.js"></script>
<script src="js/ai.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.error('SW registration failed', e));
    });
  }
</script>
</body>
</html>
